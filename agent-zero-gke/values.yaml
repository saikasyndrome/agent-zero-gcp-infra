# Default values for agent-zero.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: agent0ai/agent-zero
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels:
  app: agent-zero
  user: YOUR_USER # TODO: replace with the user key defined in k8s-resources.tf


podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 500m
    memory: 2Gi
  requests:
    cpu: 100m
    memory: 512Mi


# livenessProbe:
#   httpGet:
#     path: /
#     port: 80
#   initialDelaySeconds: 180
#   periodSeconds: 10
#   failureThreshold: 3
#   successThreshold: 1
#   timeoutSeconds: 1

# readinessProbe:
#   httpGet:
#     path: /
#     port: 80
#   initialDelaySeconds: 180
#   periodSeconds: 5
#   failureThreshold: 3
#   successThreshold: 1
#   timeoutSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

# Additional volumes on the output Deployment definition.
volumes:
  - name: agent-data
    persistentVolumeClaim:
      claimName: agent-zero-pvc

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - name: agent-data
    mountPath: /a0/agents
    subPath: agents
  - name: agent-data
    mountPath: /a0/knowledge
    subPath: knowledge
  - name: agent-data
    mountPath: /a0/usr
    subPath: usr
  - name: agent-data
    mountPath: /a0/logs
    subPath: logs
  - name: agent-data
    mountPath: /a0/plugins
    subPath: plugins
  - name: agent-data
    mountPath: /a0/skills
    subPath: skills
  - name: agent-data
    mountPath: /a0/prompts
    subPath: prompts

nodeSelector: {}

tolerations: []

affinity: {}

env:
  - name: AUTH_LOGIN
    value: "admin"
  - name: AUTH_PASSWORD
    value: "admin"

pvc:
  name: agent-zero-pvc
  storageClassName: standard-rwo
  storage: 10Gi
